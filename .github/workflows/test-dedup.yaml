# Integration tests for removing duplicates
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-dedup

permissions:
  contents: read

jobs:
  devtools:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Create this folder to silence warning
        run: mkdir -p ~/.nix-defexpr/channels

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix
          authToken: '${{ secrets.CACHIX_AUTH }}'

      - name: Build default.nix without duplicates
        run: |
          nix-shell --quiet --keep GITHUB_PAT default.nix --run "Rscript -e \"devtools::load_all();rix(date = '2023-12-30', r_pkgs = c('tidyverse', 'mlr3', 'qs', 'matrixStats', 'prospectr', 'Cubist', 'checkmate', 'mlr3misc', 'paradox'), git_pkgs = list(package_name = 'mlr3extralearners', repo_url = 'https://github.com/mlr-org/mlr3extralearners/', commit = '6e2af9ef9ecd420d2be44e9aa2488772bb9f7080'), ide = 'none', project_path = '.', overwrite = TRUE, print = FALSE, ignore_remotes_cache = FALSE)\""

      - name: Count package occurrences and verify no duplicates
        run: |
          counts=$(awk '/ = \(pkgs\.rPackages\.buildRPackage/ {gsub(/^[[:space:]]+/, ""); sub(/ = \(pkgs\.rPackages\.buildRPackage.*$/, ""); print}' default.nix | sort | uniq -c)
          echo "Package counts:"
          echo "$counts"
          echo ""
          duplicates=$(echo "$counts" | awk '$1 > 1 {print $2, "appears", $1, "times"}')
          if [ -n "$duplicates" ]; then
            echo "FAIL: Found unexpected duplicates:"
            echo "$duplicates"
            exit 1
          fi
          echo "All packages appear exactly once. OK."
